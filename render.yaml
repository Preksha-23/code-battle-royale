services:
  - type: web
    name: code-battle-royale-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false   # You will paste this from Supabase
      - key: REDIS_URL
        sync: false   # You will paste this from Upstash
